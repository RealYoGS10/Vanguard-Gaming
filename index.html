<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANGUARD | ULTRA-ARCADE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&display=swap');
        :root { --cyan: #00ffff; --bg: #00050a; }
        
        @keyframes rgb-flow {
            0% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
            33% { border-color: #00ff00; box-shadow: 0 0 10px #00ff00; }
            66% { border-color: #0000ff; box-shadow: 0 0 10px #0000ff; }
            100% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
        }

        body { background: var(--bg); color: var(--cyan); font-family: 'Orbitron', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 70px; background: #001111; border-right: 2px solid var(--cyan); display: flex; flex-direction: column; align-items: center; padding-top: 20px; z-index: 100; }
        .side-btn { width: 45px; height: 45px; margin-bottom: 25px; border: 1px solid var(--cyan); border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; font-size: 20px; }
        .side-btn:hover, .side-btn.active { background: var(--cyan); color: #000; box-shadow: 0 0 15px var(--cyan); }

        .main { flex: 1; overflow-y: auto; background: radial-gradient(circle, #001a2a 0%, #000 100%); scroll-behavior: smooth; }
        .view { display: none; padding: 20px 40px; }
        .view.active { display: block; }
        
        header { padding: 30px; text-align: center; border-bottom: 2px solid var(--cyan); background: rgba(0,0,0,0.8); position: sticky; top: 0; z-index: 50; }
        #search-bar { background: #000; color: var(--cyan); border: 1px solid var(--cyan); padding: 12px; width: 60%; font-family: 'Share Tech Mono'; margin-top: 15px; outline: none; }

        .cat-title { font-size: 1.1rem; margin: 40px 0 15px; border-left: 4px solid var(--cyan); padding-left: 15px; text-transform: uppercase; letter-spacing: 3px; background: rgba(0,255,255,0.05); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        
        .card { background: #000; border: 3px solid var(--cyan); border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.2s; position: relative; }
        .card.rgb-on { animation: rgb-flow 5s infinite linear; }
        .card:hover { transform: scale(1.03); z-index: 5; }
        .thumb { width: 100%; height: 100px; background: #001111; display: flex; align-items: center; justify-content: center; font-family: 'Share Tech Mono'; font-size: 9px; text-align: center; color: #444; border-bottom: 1px solid var(--cyan); }
        .info { padding: 8px; text-align: center; font-weight: bold; font-size: 10px; text-transform: uppercase; }

        #theater { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; flex-direction: column; }
        .t-bar { padding: 15px; background: #001a1a; border-bottom: 2px solid var(--cyan); display: flex; justify-content: space-between; align-items: center; }
        #game-area { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .g-btn { padding: 8px 15px; background: transparent; color: var(--cyan); border: 1px solid var(--cyan); cursor: pointer; font-family: 'Orbitron'; font-size: 12px; }
        .g-btn:hover { background: var(--cyan); color: #000; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="side-btn active" onclick="tab('home', this)">🏠</div>
        <div class="side-btn" onclick="tab('settings', this)">⚙️</div>
    </div>

    <div class="main">
        <div id="home" class="view active">
            <header>
                <h1 style="margin:0; letter-spacing: 8px;">VANGUARD GAMING</h1>
                <input type="text" id="search-bar" placeholder="SEARCH_SYSTEM_DATABASE..." oninput="filterGames()">
            </header>
            <div id="arcade-content"></div>
        </div>

        <div id="settings" class="view">
            <header><h1>SYSTEM CONFIG</h1></header>
            <div style="max-width:400px; margin:auto; background:#001111; padding:20px; border:1px solid var(--cyan);">
                <h3>VISUALS</h3>
                <button class="g-btn" style="width:100%" onclick="toggleRGB()">TOGGLE RGB CHROMA</button>
            </div>
        </div>
    </div>

    <div id="theater">
        <div class="t-bar">
            <button onclick="closeG()" class="g-btn">◄ ABORT</button>
            <h2 id="t-title" style="margin:0; font-size:14px; letter-spacing:2px;">DEPLOYING...</h2>
            <button onclick="full()" class="g-btn">⛶ FULL</button>
        </div>
        <div id="game-area"></div>
    </div>

    <script>
        const categories = {
            "Vanguard Originals": [
                { n: "HACKERTYPE", type: "hack" },
                { n: "BOTTLE FLIP", type: "flip" },
                { n: "RPS: SHOOT", type: "rps" }
            ],
            "Driving & Racing": [
                { n: "Polytrack", u: "https://polytrack.io" },
                { n: "Smash Karts", u: "https://smashkarts.io" },
                { n: "Slow Roads", u: "https://slowroads.io" },
                { n: "Madalin Cars 2", u: "https://madalin-stunt-cars-2.io" },
                { n: "Moto X3M", u: "https://motox3m.org" },
                { n: "Drift Boss", u: "https://driftboss.com" },
                { n: "Snow Rider 3D", u: "https://snowrider3d.com" }
            ],
            "Shooters & FPS": [
                { n: "Deadshot.io", u: "https://deadshot.io" },
                { n: "Kour.io", u: "https://kour.io" },
                { n: "1v1.lol", u: "https://1v1.lol" },
                { n: "Venge.io", u: "https://venge.io" },
                { n: "Kirka.io", u: "https://kirka.io" },
                { n: "Ev.io", u: "https://ev.io" },
                { n: "Shell Shockers", u: "https://shellshockers.io" },
                { n: "Combat Online", u: "https://combatonline.com" }
            ],
            "World & Social": [
                { n: "WorldGuessr", u: "https://worldguessr.com" },
                { n: "GeoGuessr", u: "https://geoguessr.com" },
                { n: "Gartic Phone", u: "https://garticphone.com" },
                { n: "Skribbl.io", u: "https://skribbl.io" },
                { n: "Taming.io", u: "https://taming.io" },
                { n: "Starve.io", u: "https://starve.io" }
            ],
            "Puzzles & Logic": [
                { n: "Infinite Craft", u: "https://neal.fun/infinite-craft/" },
                { n: "Password Game", u: "https://neal.fun/password-game/" },
                { n: "Little Alchemy 2", u: "https://littlealchemy2.com" },
                { n: "Tetr.io", u: "https://tetr.io" },
                { n: "2048", u: "https://play2048.co" },
                { n: "Wordle", u: "https://wordle.com" },
                { n: "Contexto", u: "https://contexto.me" },
                { n: "Absurdle", u: "https://absurdle.com" }
            ],
            "Survival & Arena": [
                { n: "Diep.io", u: "https://diep.io" },
                { n: "Slither.io", u: "https://slither.io" },
                { n: "Moomoo.io", u: "https://moomoo.io" },
                { n: "Zombs Royale", u: "https://zombsroyale.io" },
                { n: "Hole.io", u: "https://hole-io.com" },
                { n: "Paper.io", u: "https://paper-io.com" },
                { n: "Wings.io", u: "https://wings.io" },
                { n: "Surviv.io", u: "https://surviv.io" },
                { n: "FlyOrDie.io", u: "https://flyordie.io" },
                { n: "Agar.io", u: "https://agar.io" }
            ],
            "Action & Platformers": [
                { n: "Bloxd.io", u: "https://bloxd.io" },
                { n: "Minecraft Classic", u: "https://classic.minecraft.net" },
                { n: "Happy Wheels", u: "https://happywheels.com" },
                { n: "BitLife Online", u: "https://bitlifeonline.com" },
                { n: "Burrito Bison", u: "https://burritobison.com" },
                { n: "Getaway Shootout", u: "https://getawayshootout.com" },
                { n: "Rooftop Snipers", u: "https://rooftopsnipers.com" }
            ],
            "RPG & Strategy": [
                { n: "PokeRogue", u: "https://pokerogue.net" },
                { n: "RuneScape", u: "https://play.runescape.com" },
                { n: "Flyff Universe", u: "https://flyffuniverse.com" },
                { n: "Fallen London", u: "https://fallenlondon.com" }
            ]
        };

        let rgb = true;

        function load() {
            const content = document.getElementById('arcade-content');
            content.innerHTML = "";
            for (const [cat, games] of Object.entries(categories)) {
                let catSection = `<div class="cat-section" data-cat="${cat}">
                    <div class="cat-title">${cat}</div>
                    <div class="grid">`;
                games.forEach(x => {
                    catSection += `<div class="card ${rgb?'rgb-on':''}" data-name="${x.n.toLowerCase()}" onclick="play('${x.u||''}','${x.n}','${x.type||''}')">
                        <div class="thumb">ICON_NOT_FOUND<br>[VANGUARD_404]</div><div class="info">${x.n}</div></div>`;
                });
                catSection += `</div></div>`;
                content.innerHTML += catSection;
            }
        }

        function filterGames() {
            const term = document.getElementById('search-bar').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => {
                c.style.display = c.dataset.name.includes(term) ? "block" : "none";
            });
        }

        function tab(id, b) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.side-btn').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active'); b.classList.add('active');
        }

        function toggleRGB() { rgb = !rgb; load(); }

        function play(u, n, t) {
            document.getElementById('theater').style.display = 'flex';
            document.getElementById('t-title').innerText = n;
            const a = document.getElementById('game-area');
            if(u) a.innerHTML = `<iframe src="${u}" allow="autoplay; fullscreen; keyboard"></iframe>`;
            else if(t==='hack') {
                const code = "VANGUARD_OVERRIDE_ROOT";
                a.innerHTML = `<div style="text-align:center"><h3>TYPE TO BYPASS:</h3><p style="color:#fff;letter-spacing:2px;">${code}</p><input id="h-in" oninput="if(this.value==='${code}'){alert('ACCESS GRANTED');closeG()}" style="width:100%"></div>`;
            }
            else if(t==='flip') {
                a.innerHTML = `<h1 id="f-res" style="font-size:100px;">🍾</h1><button class="g-btn" onclick="const r=Math.random()>0.8?'✅ LANDED!':'❌ FAILED';document.getElementById('f-res').innerText=r">FLIP BOTTLE</button>`;
            }
            else if(t==='rps') {
                a.innerHTML = `<div style="text-align:center"><h3>SHOOT!</h3><button class="g-btn" onclick="rps('Rock')">ROCK</button><button class="g-btn" onclick="rps('Paper')">PAPER</button><button class="g-btn" onclick="rps('Scissors')">SCISSORS</button><h2 id="r-res"></h2></div>`;
            }
        }

        function rps(p) {
            const m = ['Rock','Paper','Scissors']; const b = m[Math.floor(Math.random()*3)];
            document.getElementById('r-res').innerText = `YOU: ${p} | BOT: ${b}`;
        }

        function closeG() { document.getElementById('theater').style.display = 'none'; document.getElementById('game-area').innerHTML = ""; }
        function full() { const el = document.querySelector('iframe'); if(el && el.requestFullscreen) el.requestFullscreen(); }
        
        load();
    </script>
</body>
</html>
