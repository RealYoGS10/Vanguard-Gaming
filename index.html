<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANGUARD | GOLIATH V14</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&display=swap');
        
        :root { 
            --cyan: #00ffff; --bg: #00050a; --card-bg: rgba(0, 15, 25, 0.7); 
            --glow: 12px; --border-w: 2px; 
        }

        body.light-mode { --bg: #e0e0e0; --cyan: #005555; --card-bg: #fff; color: #000; }

        body { background: var(--bg); color: var(--cyan); font-family: 'Orbitron', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; transition: background 0.3s; }

        /* SIDEBAR */
        .sidebar { width: 70px; background: rgba(0,10,10,0.95); border-right: 2px solid var(--cyan); display: flex; flex-direction: column; align-items: center; padding-top: 20px; z-index: 100; }
        .side-btn { width: 45px; height: 45px; margin-bottom: 25px; border: 1px solid var(--cyan); border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--cyan); transition: 0.3s; font-size: 20px; }
        .side-btn:hover, .side-btn.active { background: var(--cyan); color: #000; box-shadow: 0 0 20px var(--cyan); }

        .main { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
        header { padding: 60px 20px; text-align: center; border-bottom: 1px solid rgba(0,255,255,0.2); background: linear-gradient(to bottom, rgba(0,255,255,0.05), transparent); }
        #search { background: rgba(0,0,0,0.7); color: var(--cyan); border: 2px solid var(--cyan); padding: 15px; width: 60%; max-width: 600px; font-family: 'Share Tech Mono'; outline: none; border-radius: 50px; text-align: center; font-size: 1.1rem; box-shadow: 0 0 10px rgba(0,255,255,0.1); }

        /* THE GRID & CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 40px; }
        .card { background: var(--card-bg); border: var(--border-w) solid rgba(0,255,255,0.2); border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s; backdrop-filter: blur(10px); }
        .card:hover { transform: translateY(-8px) scale(1.03); border-color: var(--cyan); box-shadow: 0 0 var(--glow) var(--cyan); }
        
        .thumb-box { width: 100%; height: 100px; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; position: relative; }
        .thumb-box img { width: 50px; height: 50px; z-index: 2; filter: drop-shadow(0 0 5px var(--cyan)); }
        .bg-text { position: absolute; font-size: 50px; opacity: 0.03; font-weight: 900; pointer-events: none; }

        .info { padding: 10px; text-align: center; font-size: 9px; font-weight: 900; text-transform: uppercase; background: rgba(0,0,0,0.5); border-top: 1px solid rgba(0,255,255,0.1); color: #fff; }

        /* MODAL */
        #theater { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; flex-direction: column; }
        .t-bar { padding: 15px; background: #001111; border-bottom: 2px solid var(--cyan); display: flex; justify-content: space-between; align-items: center; }
        iframe { flex: 1; border: none; }
        .g-btn { padding: 8px 15px; background: transparent; color: var(--cyan); border: 1px solid var(--cyan); cursor: pointer; font-family: 'Orbitron'; border-radius: 4px; }
        .g-btn:hover { background: var(--cyan); color: #000; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="side-btn active" onclick="tab('home', this)">🏠</div>
        <div class="side-btn" onclick="tab('settings', this)">⚙️</div>
    </nav>

    <div class="main">
        <div id="home" class="view">
            <header>
                <h1 style="letter-spacing: 15px; font-size: 3rem; margin:0 0 20px 0;">VANGUARD</h1>
                <input type="text" id="search" placeholder="SEARCH_DATABASE..." oninput="filter()">
            </header>
            <div id="game-grid" class="grid"></div>
        </div>

        <div id="settings" class="view" style="display:none; padding: 60px;">
            <h1>SYSTEM CONFIG</h1>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 40px; max-width: 900px;">
                <div style="background: rgba(0,255,255,0.05); padding: 30px; border: 1px solid var(--cyan); border-radius: 15px;">
                    <h3>APPEARANCE</h3>
                    <button class="g-btn" style="width:100%" onclick="document.body.classList.toggle('light-mode')">DARK / LIGHT MODE</button><br><br>
                    <button class="g-btn" style="width:100%" onclick="window.location.reload(true)">FORCE RE-SYNC (FIX ERRORS)</button>
                </div>
                <div style="background: rgba(0,255,255,0.05); padding: 30px; border: 1px solid var(--cyan); border-radius: 15px;">
                    <h3>DYNAMICS</h3>
                    <p>GLOW STRENGTH: <input type="range" min="0" max="50" value="12" oninput="document.documentElement.style.setProperty('--glow', this.value+'px')"></p>
                    <p>BORDER THICKNESS: <input type="range" min="1" max="10" value="2" oninput="document.documentElement.style.setProperty('--border-w', this.value+'px')"></p>
                </div>
            </div>
        </div>
    </div>

    <div id="theater">
        <div class="t-bar">
            <button class="g-btn" onclick="closeG()">CLOSE</button>
            <div style="text-align: center;">
                <span id="gt" style="font-size: 14px; font-weight: bold;">DEPLOYING...</span>
                <button id="ext" class="g-btn" style="font-size: 10px; margin-left: 15px; border-color: #ff3333; color: #ff3333;">OPEN NEW TAB (IF BLANK)</button>
            </div>
            <button class="g-btn" onclick="document.querySelector('iframe').requestFullscreen()">FULLSCREEN</button>
        </div>
        <iframe id="gf"></iframe>
    </div>

    <script>
        const db = [
            // THE ORIGINALS
            {n:"HACKERTYPE", t:"hack"}, {n:"BOTTLE FLIP", t:"flip"}, {n:"RPS SHOOT", t:"rps"},
            // RACING & DRIVING
            {n:"Drift Hunters", u:"https://drift-hunters.com"}, {n:"Polytrack", u:"https://polytrack.io"}, {n:"Slow Roads", u:"https://slowroads.io"}, {n:"Smash Karts", u:"https://smashkarts.io"}, {n:"Moto X3M", u:"https://motox3m.org"}, {n:"Drift Boss", u:"https://driftboss.com"}, {n:"Madalin Cars 2", u:"https://madalin-stunt-cars-2.io"}, {n:"Snow Rider 3D", u:"https://snowrider3d.com"},
            // FPS & SHOOTERS
            {n:"Krunker.io", u:"https://krunker.io"}, {n:"Shell Shockers", u:"https://shellshockers.io"}, {n:"Venge.io", u:"https://venge.io"}, {n:"Kirka.io", u:"https://kirka.io"}, {n:"Ev.io", u:"https://ev.io"}, {n:"1v1.lol", u:"https://1v1.lol"}, {n:"Deadshot.io", u:"https://deadshot.io"}, {n:"Kour.io", u:"https://kour.io"}, {n:"Combat Online", u:"https://combatonline.com"}, {n:"Voxiom.io", u:"https://voxiom.io"}, {n:"Pixel Warfare", u:"https://pixelwarfare.io"}, {n:"Narrow.one", u:"https://narrow.one"},
            // IO & SURVIVAL
            {n:"Infinite Craft", u:"https://neal.fun/infinite-craft/"}, {n:"Password Game", u:"https://neal.fun/password-game/"}, {n:"GeoGuessr", u:"https://geoguessr.com"}, {n:"WorldGuessr", u:"https://worldguessr.com"}, {n:"Gartic Phone", u:"https://garticphone.com"}, {n:"Skribbl.io", u:"https://skribbl.io"}, {n:"Taming.io", u:"https://taming.io"}, {n:"Starve.io", u:"https://starve.io"}, {n:"Moomoo.io", u:"https://moomoo.io"}, {n:"Bloxd.io", u:"https://bloxd.io"}, {n:"Slither.io", u:"https://slither.io"}, {n:"Diep.io", u:"https://diep.io"}, {n:"Hole.io", u:"https://hole-io.com"}, {n:"Paper.io", u:"https://paper-io.com"}, {n:"Wings.io", u:"https://wings.io"}, {n:"Zombs Royale", u:"https://zombsroyale.io"}, {n:"Agar.io", u:"https://agar.io"}, {n:"FlyOrDie.io", u:"https://flyordie.io"}, {n:"Surviv.io", u:"https://surviv.io"}, {n:"Bonk.io", u:"https://bonk.io"}, {n:"Deeeep.io", u:"https://deeeep.io"}, {n:"Mope.io", u:"https://moper.io"}, {n:"Superhex.io", u:"https://superhex.io"}, {n:"Powerline.io", u:"https://powerline.io"}, {n:"Splix.io", u:"https://splix.io"}, {n:"Lordz.io", u:"https://lordz.io"}, {n:"Gulper.io", u:"https://gulper.io"}, {n:"Cubes2048", u:"https://cubes2048.io"}, {n:"Hexanaut.io", u:"https://hexanaut.io"}, {n:"Worms Zone", u:"https://worms.zone"}, {n:"Ducklings.io", u:"https://ducklings.io"}, {n:"LolBeans.io", u:"https://lolbeans.io"}, {n:"JustFall.lol", u:"https://justfall.lol"}, {n:"BuildRoyale.io", u:"https://buildroyale.io"}, {n:"Wilds.io", u:"https://wilds.io"}, {n:"Minesweeper", u:"https://minesweeper.online"}, {n:"Voxiom.io", u:"https://voxiom.io"}, {n:"Warbro.io", u:"https://warbro.io"},
            // CLASSICS & WEB GAMES
            {n:"Cookie Clicker", u:"https://orteil.dashnet.org/cookieclicker/"}, {n:"Tetr.io", u:"https://tetr.io"}, {n:"2048", u:"https://play2048.co"}, {n:"Wordle", u:"https://wordle.com"}, {n:"Contexto", u:"https://contexto.me"}, {n:"Absurdle", u:"https://absurdle.com"}, {n:"Little Alchemy 2", u:"https://littlealchemy2.com"}, {n:"Chess.com", u:"https://chess.com"}, {n:"Minecraft", u:"https://classic.minecraft.net"}, {n:"PokeRogue", u:"https://pokerogue.net"}, {n:"Runescape", u:"https://oldschool.runescape.com"}, {n:"Flyff", u:"https://universe.flyff.com"}, {n:"Fallen London", u:"https://fallenlondon.com"}, {n:"BitLife", u:"https://bitlifeonline.com"}, {n:"FNF", u:"https://fridaynightfunkin.net"}, {n:"TagPro", u:"https://tagpro.gg"}, {n:"Happy Wheels", u:"https://totaljerkface.com/happy_wheels.tjf"}, {n:"Burrito Bison", u:"https://burritobison.com"}, {n:"Getaway Shootout", u:"https://getawayshootout.com"}, {n:"Rooftop Snipers", u:"https://rooftopsnipers.com"}, {n:"Townscaper", u:"https://townscaper.com"}, {n:"Spelunky", u:"https://spelunkyworld.com/browser"}, {n:"BasketBros", u:"https://basketbros.io"}, {n:"FootballBros", u:"https://footballbros.io"}, {n:"RocketGoal.io", u:"https://rocketgoal.io"}, {n:"EvoWars.io", u:"https://evowars.io"}, {n:"Starblast.io", u:"https://starblast.io"}, {n:"Kiomet", u:"https://kiomet.com"}, {n:"Minigiants.io", u:"https://minigiants.io"}, {n:"DarkOrbit", u:"https://darkorbit.com"}, {n:"Kingdom of Loathing", u:"https://kingdomofloathing.com"}, {n:"Torn City", u:"https://torn.com"}, {n:"Agonialands", u:"https://agonialands.com"}, {n:"Zed City", u:"https://zed.city"}, {n:"Grid Match", u:"https://gridmatch.fun"}, {n:"NZP", u:"https://nzp.gay"}, {n:"Netquel.io", u:"https://netquel.io"}
        ];

        function init() {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = "";
            db.forEach(g => {
                const iconUrl = g.u ? `https://www.google.com/s2/favicons?sz=128&domain=${new URL(g.u).hostname}` : '';
                grid.innerHTML += `
                <div class="card" data-name="${g.n.toLowerCase()}" onclick="play('${g.u||''}','${g.n}','${g.t||''}')">
                    <div class="thumb-box">
                        <span class="bg-text">VG</span>
                        ${g.u ? `<img src="${iconUrl}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/5260/5260472.png'">` : `<span style="font-size:30px">⚡</span>`}
                    </div>
                    <div class="info">${g.n}</div>
                </div>`;
            });
        }

        function tab(id, btn) {
            document.querySelectorAll('.view').forEach(v => v.style.display='none');
            document.getElementById(id).style.display='block';
            document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function play(u, n, t) {
            document.getElementById('theater').style.display='flex';
            document.getElementById('gt').innerText = n;
            document.getElementById('ext').onclick = () => window.open(u, '_blank');
            const f = document.getElementById('gf');
            if(u) f.src = u;
            else if(t==='hack') f.srcdoc = "<body style='background:#000;color:#0ff;display:flex;align-items:center;justify-content:center;height:100vh;font-family:monospace'><h1>SYSTEM_BYPASSED</h1></body>";
        }

        function closeG() { document.getElementById('theater').style.display='none'; document.getElementById('gf').src=""; }
        
        function filter() {
            const q = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => c.style.display = c.dataset.name.includes(q) ? 'block' : 'none');
        }

        window.onload = init;
    </script>
</body>
</html>
