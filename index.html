<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANGUARD | COMMAND CENTER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&display=swap');
        
        :root { 
            --cyan: #00ffff; 
            --bg: #00050a; 
            --border-size: 3px;
            --glow: 10px;
        }
        
        @keyframes rgb-flow {
            0% { border-color: #ff0000; box-shadow: 0 0 var(--glow) #ff0000; }
            33% { border-color: #00ff00; box-shadow: 0 0 var(--glow) #00ff00; }
            66% { border-color: #0000ff; box-shadow: 0 0 var(--glow) #0000ff; }
            100% { border-color: #ff0000; box-shadow: 0 0 var(--glow) #ff0000; }
        }

        body { background: var(--bg); color: var(--cyan); font-family: 'Orbitron', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        .sidebar { width: 70px; background: #001111; border-right: 2px solid var(--cyan); display: flex; flex-direction: column; align-items: center; padding-top: 20px; z-index: 100; }
        .side-btn { width: 45px; height: 45px; margin-bottom: 25px; border: 1px solid var(--cyan); border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; font-size: 20px; color: var(--cyan); background: transparent; }
        .side-btn:hover, .side-btn.active { background: var(--cyan); color: #000; box-shadow: 0 0 15px var(--cyan); }

        .main { flex: 1; overflow-y: auto; background: radial-gradient(circle, #001a2a 0%, #000 100%); }
        .view { display: none; padding: 20px 40px; }
        .view.active { display: block; }
        
        header { padding: 30px; text-align: center; border-bottom: 2px solid var(--cyan); background: rgba(0,0,0,0.8); position: sticky; top: 0; z-index: 50; }
        #search-bar { background: #000; color: var(--cyan); border: 1px solid var(--cyan); padding: 12px; width: 60%; font-family: 'Share Tech Mono'; margin-top: 15px; outline: none; }

        .cat-title { font-size: 1.1rem; margin: 40px 0 15px; border-left: 4px solid var(--cyan); padding-left: 15px; text-transform: uppercase; letter-spacing: 3px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        
        .card { background: #000; border: var(--border-size) solid var(--cyan); border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.2s; }
        .card.rgb-on { animation: rgb-flow 5s infinite linear; }
        .thumb { width: 100%; height: 100px; background: #001111; display: flex; align-items: center; justify-content: center; font-family: 'Share Tech Mono'; font-size: 9px; text-align: center; color: #444; border-bottom: 1px solid var(--cyan); }
        .info { padding: 8px; text-align: center; font-weight: bold; font-size: 10px; text-transform: uppercase; }

        /* SETTINGS PANEL */
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 800px; margin: auto; }
        .s-box { background: #001111; padding: 20px; border: 1px solid var(--cyan); border-radius: 10px; }
        .s-box h3 { margin-top: 0; font-size: 14px; }
        
        input[type="range"] { width: 100%; accent-color: var(--cyan); }

        #theater { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; flex-direction: column; }
        .t-bar { padding: 15px; background: #001a1a; border-bottom: 2px solid var(--cyan); display: flex; justify-content: space-between; align-items: center; }
        #game-area { flex: 1; display: flex; align-items: center; justify-content: center; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .g-btn { padding: 8px 15px; background: transparent; color: var(--cyan); border: 1px solid var(--cyan); cursor: pointer; font-family: 'Orbitron'; font-size: 12px; }
        .g-btn:hover { background: var(--cyan); color: #000; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <button class="side-btn active" onclick="showTab('home', this)">🏠</button>
        <button class="side-btn" onclick="showTab('settings', this)">⚙️</button>
    </nav>

    <div class="main">
        <div id="home" class="view active">
            <header>
                <h1 style="margin:0; letter-spacing: 8px;">VANGUARD GAMING</h1>
                <input type="text" id="search-bar" placeholder="SEARCH_SYSTEM..." oninput="filterGames()">
            </header>
            <div id="arcade-content"></div>
        </div>

        <div id="settings" class="view">
            <header><h1>SYSTEM CONFIG</h1></header>
            <div class="settings-grid">
                <div class="s-box">
                    <h3>RGB VISUALS</h3>
                    <button class="g-btn" style="width:100%" onclick="toggleRGB()">TOGGLE CHROMA</button>
                    <p style="font-size:10px; color:#555; margin-top:10px;">Disable if experiencing frame drops.</p>
                </div>
                <div class="s-box">
                    <h3>GLOW INTENSITY</h3>
                    <input type="range" min="0" max="30" value="10" oninput="updateStyle('--glow', this.value + 'px')">
                </div>
                <div class="s-box">
                    <h3>BORDER THICKNESS</h3>
                    <input type="range" min="1" max="8" value="3" oninput="updateStyle('--border-size', this.value + 'px')">
                </div>
                <div class="s-box">
                    <h3>CORE RESET</h3>
                    <button class="g-btn" style="width:100%" onclick="location.reload()">REBOOT SYSTEM</button>
                </div>
            </div>
        </div>
    </div>

    <div id="theater">
        <div class="t-bar">
            <button onclick="closeG()" class="g-btn">◄ BACK</button>
            <h2 id="t-title" style="margin:0; font-size:14px;">DEPLOYING...</h2>
            <button onclick="document.querySelector('iframe').requestFullscreen()" class="g-btn">⛶ FULL</button>
        </div>
        <div id="game-area"></div>
    </div>

    <script>
        const categories = {
            "Vanguard Originals": [
                { n: "HACKERTYPE", type: "hack" },
                { n: "BOTTLE FLIP", type: "flip" },
                { n: "RPS: SHOOT", type: "rps" }
            ],
            "Driving & Racing": [
                { n: "Polytrack", u: "https://polytrack.io" },
                { n: "Smash Karts", u: "https://smashkarts.io" },
                { n: "Slow Roads", u: "https://slowroads.io" },
                { n: "Madalin Cars 2", u: "https://madalin-stunt-cars-2.io" },
                { n: "Moto X3M", u: "https://motox3m.org" },
                { n: "Drift Boss", u: "https://driftboss.com" },
                { n: "Snow Rider 3D", u: "https://snowrider3d.com" }
            ],
            "Shooters & FPS": [
                { n: "Deadshot.io", u: "https://deadshot.io" },
                { n: "Kour.io", u: "https://kour.io" },
                { n: "1v1.lol", u: "https://1v1.lol" },
                { n: "Venge.io", u: "https://venge.io" },
                { n: "Kirka.io", u: "https://kirka.io" },
                { n: "Ev.io", u: "https://ev.io" },
                { n: "Shell Shockers", u: "https://shellshockers.io" }
            ]
            // ... Add your other 40+ links here in the same format
        };

        let rgbActive = true;

        function init() {
            const content = document.getElementById('arcade-content');
            content.innerHTML = "";
            for (const [cat, games] of Object.entries(categories)) {
                let section = `<div class="cat-title">${cat}</div><div class="grid">`;
                games.forEach(g => {
                    section += `<div class="card ${rgbActive?'rgb-on':''}" data-name="${g.n.toLowerCase()}" onclick="launch('${g.u||''}','${g.n}','${g.type||''}')">
                        <div class="thumb">ICON_NOT_FOUND<br>[V_404]</div><div class="info">${g.n}</div></div>`;
                });
                section += `</div>`;
                content.innerHTML += section;
            }
        }

        function showTab(id, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function updateStyle(prop, val) {
            document.documentElement.style.setProperty(prop, val);
        }

        function toggleRGB() {
            rgbActive = !rgbActive;
            init();
        }

        function filterGames() {
            const val = document.getElementById('search-bar').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => {
                c.style.display = c.dataset.name.includes(val) ? "block" : "none";
            });
        }

        function launch(u, n, t) {
            document.getElementById('theater').style.display = 'flex';
            document.getElementById('t-title').innerText = n;
            const area = document.getElementById('game-area');
            if(u) area.innerHTML = `<iframe src="${u}"></iframe>`;
            else if(t==='hack') area.innerHTML = `<h3>TYPE: VANGUARD_CORE</h3><input oninput="if(this.value==='VANGUARD_CORE'){alert('DONE');closeG()}">`;
            else if(t==='flip') area.innerHTML = `<h1 id="f">🍾</h1><button class="g-btn" onclick="document.getElementById('f').innerText=Math.random()>0.7?'✅':'❌'">FLIP</button>`;
            else if(t==='rps') area.innerHTML = `<button class="g-btn" onclick="alert('BOT CHOSE ROCK')">SHOOT</button>`;
        }

        function closeG() {
            document.getElementById('theater').style.display = 'none';
            document.getElementById('game-area').innerHTML = "";
        }

        // Start system
        window.onload = init;
    </script>
</body>
</html>
