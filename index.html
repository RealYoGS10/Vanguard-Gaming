<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANGUARD GAMING | ORIGINALS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&display=swap');

        :root { --cyan: #00ffff; --bg: #00050a; }

        @keyframes rgb-flow {
            0% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
            33% { border-color: #00ff00; box-shadow: 0 0 15px #00ff00; }
            66% { border-color: #0000ff; box-shadow: 0 0 15px #0000ff; }
            100% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
        }

        body {
            background: var(--bg); color: var(--cyan);
            font-family: 'Orbitron', sans-serif; margin: 0;
            display: flex; height: 100vh; overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 70px; background: #001111; border-right: 2px solid var(--cyan);
            display: flex; flex-direction: column; align-items: center; padding-top: 20px;
        }

        .side-btn {
            width: 40px; height: 40px; margin-bottom: 20px;
            border: 1px solid var(--cyan); border-radius: 5px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }

        .side-btn:hover { background: var(--cyan); color: #000; }

        /* MAIN DASHBOARD */
        .main { flex: 1; overflow-y: auto; background: radial-gradient(circle, #001a2a 0%, #000 100%); }
        header { padding: 30px; text-align: center; border-bottom: 2px solid var(--cyan); background: rgba(0,0,0,0.8); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; padding: 40px; }

        /* THE CARD */
        .card {
            background: #000; border: 3px solid var(--cyan); border-radius: 10px;
            overflow: hidden; cursor: pointer; transition: 0.3s;
            animation: rgb-flow 5s infinite linear;
        }

        .card:hover { transform: scale(1.05); }

        .thumb {
            width: 100%; height: 140px; background: #001111;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Share Tech Mono'; font-size: 14px; text-align: center;
            color: #555; border-bottom: 1px solid var(--cyan);
        }

        .info { padding: 10px; text-align: center; font-weight: bold; font-size: 12px; }

        /* THEATER & CUSTOM GAMES */
        #theater {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; flex-direction: column;
        }

        .t-bar { padding: 15px; background: #001a1a; border-bottom: 2px solid var(--cyan); display: flex; justify-content: space-between; }
        #game-area { flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; }
        iframe { width: 100%; height: 100%; border: none; }

        button { background: transparent; color: var(--cyan); border: 1px solid var(--cyan); padding: 10px; cursor: pointer; font-family: 'Orbitron'; }
        button:hover { background: var(--cyan); color: #000; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="side-btn" onclick="location.reload()">🏠</div>
        <div class="side-btn">🛡️</div>
        <div class="side-btn">⚙️</div>
    </div>

    <div class="main">
        <header>
            <h1 style="margin:0; letter-spacing: 8px;">VANGUARD GAMING</h1>
            <p style="font-size: 10px; color: #444;">V4.2 // ORIGINALS_LOADED</p>
        </header>
        <div class="grid" id="g"></div>
    </div>

    <div id="theater">
        <div class="t-bar">
            <button onclick="closeG()">✖ CLOSE</button>
            <h2 id="t-title" style="margin:0;">VANGUARD_CORE</h2>
            <button onclick="full()">⛶ FULL</button>
        </div>
        <div id="game-area"></div>
    </div>

    <script>
        // EXTERNAL MISSIONS
        const links = [
            { n: "BLOXD.IO", u: "https://bloxd.io/" },
            { n: "VECK.IO", u: "https://veck.io/" },
            { n: "SPACE WAVES", u: "https://spacewaves.io/" },
            { n: "TRAFFIC RIDER", u: "https://traffic-rider.io/" },
            { n: "ROCKET GOAL", u: "https://rocketgoal.io/" },
            { n: "DRIFT HUNTERS", u: "https://www.bing.com/games/embed/drift-hunters/" }
        ];

        // VANGUARD ORIGINALS (Built-in code)
        const originals = [
            { n: "VANGUARD: RPS", type: "rps" },
            { n: "CLICKER EVO", type: "click" },
            { n: "CORE GUESSER", type: "guess" }
        ];

        const container = document.getElementById('g');

        // Render Cards
        [...originals, ...links].forEach(game => {
            container.innerHTML += `
                <div class="card" onclick="play('${game.u || ''}', '${game.n}', '${game.type || ''}')">
                    <div class="thumb">IMAGE NOT FOUND<br>[ERROR_404]</div>
                    <div class="info">${game.n}</div>
                </div>`;
        });

        function play(u, n, type) {
            const area = document.getElementById('game-area');
            document.getElementById('theater').style.display = 'flex';
            document.getElementById('t-title').innerText = n;

            if (u) {
                area.innerHTML = `<iframe src="${u}"></iframe>`;
            } else {
                loadOriginal(type);
            }
        }

        function loadOriginal(type) {
            const area = document.getElementById('game-area');
            if (type === 'rps') {
                area.innerHTML = `<div style="text-align:center">
                    <h3>ROCK PAPER SCISSORS</h3>
                    <button onclick="runRPS('Rock')">ROCK</button>
                    <button onclick="runRPS('Paper')">PAPER</button>
                    <button onclick="runRPS('Scissors')">SCISSORS</button>
                    <p id="rps-res"></p>
                </div>`;
            } else if (type === 'click') {
                let count = 0;
                area.innerHTML = `<div style="text-align:center">
                    <h3>CLICKER EVOLUTION</h3>
                    <h1 id="c-val">0</h1>
                    <button onclick="document.getElementById('c-val').innerText = ++count">UPGRADE CORE</button>
                </div>`;
            } else if (type === 'guess') {
                area.innerHTML = `<div style="text-align:center">
                    <h3>CORE GUESSER (1-10)</h3>
                    <input type="number" id="g-in" style="background:#000; color:#0ff; border:1px solid #0ff">
                    <button onclick="runGuess()">TRY</button>
                    <p id="g-res"></p>
                </div>`;
            }
        }

        function runRPS(p) {
            const moves = ['Rock', 'Paper', 'Scissors'];
            const bot = moves[Math.floor(Math.random()*3)];
            document.getElementById('rps-res').innerText = `YOU: ${p} | BOT: ${bot} -> ${p===bot ? 'TIE' : 'LOGGED'}`;
        }

        function runGuess() {
            const val = document.getElementById('g-in').value;
            const secret = Math.floor(Math.random()*10)+1;
            document.getElementById('g-res').innerText = val == secret ? "CORE ACCESSED!" : "DENIED. WAS " + secret;
        }

        function closeG() {
            document.getElementById('theater').style.display = 'none';
            document.getElementById('game-area').innerHTML = "";
        }

        function full() {
            let el = document.getElementById('game-area');
            if(el.requestFullscreen) el.requestFullscreen();
        }
    </script>
</body>
</html>
