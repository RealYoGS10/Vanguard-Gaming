<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>VANGUARD | V12 APEX</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&display=swap');
        :root { --cyan: #00ffff; --bg: #00050a; --card-bg: #030a12; --glow: 10px; --border: 2px; }
        body.light-mode { --bg: #f4f4f4; --cyan: #006666; --card-bg: #fff; color: #111; }
        
        body { background: var(--bg); color: var(--cyan); font-family: 'Orbitron', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; transition: 0.3s; }
        
        /* SIDEBAR */
        .sidebar { width: 70px; background: rgba(0,10,10,0.9); border-right: 2px solid var(--cyan); display: flex; flex-direction: column; align-items: center; padding-top: 20px; z-index: 100; }
        .side-btn { width: 45px; height: 45px; margin-bottom: 25px; border: 1px solid var(--cyan); border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; font-size: 20px; color: var(--cyan); }
        .side-btn:hover, .side-btn.active { background: var(--cyan); color: #000; box-shadow: 0 0 15px var(--cyan); }

        .main { flex: 1; overflow-y: auto; padding-bottom: 100px; }
        header { padding: 40px; text-align: center; border-bottom: 2px solid var(--cyan); background: rgba(0,0,0,0.8); position: sticky; top: 0; z-index: 50; }
        #search { background: rgba(0,0,0,0.5); color: var(--cyan); border: 1px solid var(--cyan); padding: 12px; width: 60%; font-family: 'Share Tech Mono'; outline: none; border-radius: 5px; }

        /* THE GRID & NEW ICONS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 40px; }
        .card { background: var(--card-bg); border: var(--border) solid var(--cyan); border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s; position: relative; box-shadow: 0 0 var(--glow) rgba(0,255,255,0.1); }
        .card:hover { transform: translateY(-5px); box-shadow: 0 0 20px var(--cyan); }
        .card.rgb { animation: rgb-anim 5s infinite linear; }
        
        @keyframes rgb-anim { 
            0% { border-color: #ff0000; } 33% { border-color: #00ff00; } 66% { border-color: #0000ff; } 100% { border-color: #ff0000; }
        }

        .thumb-box { width: 100%; height: 110px; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .placeholder { position: absolute; font-size: 40px; opacity: 0.2; }
        
        .info { padding: 12px; text-align: center; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; border-top: 1px solid rgba(0,255,255,0.2); }

        /* MODAL */
        #theater { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; flex-direction: column; }
        .t-bar { padding: 15px; background: #001111; border-bottom: 2px solid var(--cyan); display: flex; justify-content: space-between; align-items: center; }
        iframe { flex: 1; border: none; background: #000; }
        .g-btn { padding: 10px 20px; background: transparent; color: var(--cyan); border: 1px solid var(--cyan); cursor: pointer; font-family: 'Orbitron'; font-size: 11px; }
        .g-btn:hover { background: var(--cyan); color: #000; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="side-btn active" onclick="show('home', this)">🏠</div>
        <div class="side-btn" onclick="show('settings', this)">⚙️</div>
    </nav>

    <div class="main">
        <div id="home" class="view active">
            <header>
                <h1 style="letter-spacing: 15px; margin-bottom: 20px;">VANGUARD</h1>
                <input type="text" id="search" placeholder="SYSTEM_SEARCH..." oninput="filter()">
            </header>
            <div id="game-grid" class="grid"></div>
        </div>

        <div id="settings" class="view" style="display:none; padding: 50px;">
            <h1>SYSTEM CONFIG</h1>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 30px; max-width: 800px;">
                <div style="background: rgba(0,255,255,0.05); padding: 20px; border-radius: 10px; border: 1px solid var(--cyan);">
                    <h3>VISUALS</h3>
                    <button class="g-btn" style="width:100%" onclick="document.body.classList.toggle('light-mode')">TOGGLE DARK/LIGHT</button><br><br>
                    <button class="g-btn" style="width:100%" onclick="toggleRGB()">TOGGLE RGB BORDERS</button>
                </div>
                <div style="background: rgba(0,255,255,0.05); padding: 20px; border-radius: 10px; border: 1px solid var(--cyan);">
                    <h3>INTENSITY</h3>
                    <p>GLOW: <input type="range" min="0" max="50" value="10" oninput="document.documentElement.style.setProperty('--glow', this.value+'px')"></p>
                    <p>BORDER: <input type="range" min="1" max="10" value="2" oninput="document.documentElement.style.setProperty('--border', this.value+'px')"></p>
                </div>
            </div>
        </div>
    </div>

    <div id="theater">
        <div class="t-bar">
            <button class="g-btn" onclick="closeG()">BACK</button>
            <div style="text-align: center;">
                <span id="g-title" style="display:block; font-size: 14px; margin-bottom: 5px;">LOADING...</span>
                <button id="popout" class="g-btn" style="font-size: 9px; padding: 4px 8px; border-color: #ff5555; color: #ff5555;">FIX: OPEN IN NEW TAB</button>
            </div>
            <button class="g-btn" onclick="document.querySelector('iframe').requestFullscreen()">FULLSCREEN</button>
        </div>
        <iframe id="g-frame"></iframe>
    </div>

    <script>
        // CACHE BUSTER: Forces reload if version changes
        const VER = "12.1";
        if(localStorage.getItem('v_ver') !== VER) {
            localStorage.setItem('v_ver', VER);
            window.location.reload(true);
        }

        const games = [
            {n:"Drift Hunters", u:"https://drift-hunters.com"}, {n:"Polytrack", u:"https://polytrack.io"},
            {n:"Slow Roads", u:"https://slowroads.io"}, {n:"Smash Karts", u:"https://smashkarts.io"},
            {n:"Moto X3M", u:"https://motox3m.org"}, {n:"Drift Boss", u:"https://driftboss.com"},
            {n:"Madalin Cars 2", u:"https://madalin-stunt-cars-2.io"}, {n:"Snow Rider 3D", u:"https://snowrider3d.com"},
            {n:"Krunker.io", u:"https://krunker.io"}, {n:"Shell Shockers", u:"https://shellshockers.io"},
            {n:"Venge.io", u:"https://venge.io"}, {n:"Kirka.io", u:"https://kirka.io"}, {n:"Ev.io", u:"https://ev.io"},
            {n:"1v1.lol", u:"https://1v1.lol"}, {n:"Deadshot.io", u:"https://deadshot.io"}, {n:"Kour.io", u:"https://kour.io"},
            {n:"Combat Online", u:"https://combatonline.com"}, {n:"Infinite Craft", u:"https://neal.fun/infinite-craft/"},
            {n:"GeoGuessr", u:"https://geoguessr.com"}, {n:"Skribbl.io", u:"https://skribbl.io"},
            {n:"Bloxd.io", u:"https://bloxd.io"}, {n:"Slither.io", u:"https://slither.io"}, {n:"Diep.io", u:"https://diep.io"},
            {n:"Hole.io", u:"https://hole-io.com"}, {n:"Paper.io", u:"https://paper-io.com"}, {n:"Agar.io", u:"https://agar.io"},
            {n:"Cookie Clicker", u:"https://orteil.dashnet.org/cookieclicker/"}, {n:"Tetr.io", u:"https://tetr.io"},
            {n:"Minecraft", u:"https://classic.minecraft.net"}, {n:"PokeRogue", u:"https://pokerogue.net"},
            {n:"FNF", u:"https://fridaynightfunkin.net"}, {n:"Minesweeper", u:"https://minesweeper.online"},
            {n:"BasketBros", u:"https://basketbros.io"}, {n:"Townscaper", u:"https://townscaper.com"},
            {n:"HACKERTYPE", t:"hack"}, {n:"BOTTLE FLIP", t:"flip"}
        ];

        let rgb = false;

        function init() {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = "";
            games.forEach(g => {
                // ICON LOGIC: Uses a screenshot service to get the site's thumbnail
                const icon = g.u ? `https://api.screenshotmachine.com/?key=bc893e&url=${encodeURIComponent(g.u)}&dimension=320x240` : '';
                grid.innerHTML += `
                    <div class="card ${rgb?'rgb':''}" data-name="${g.n.toLowerCase()}" onclick="launch('${g.u||''}','${g.n}','${g.t||''}')">
                        <div class="thumb-box">
                            <div class="placeholder">🛡️</div>
                            ${g.u ? `<img src="https://icon.horse/icon/${new URL(g.u).hostname}" onerror="this.style.display='none'">` : ''}
                        </div>
                        <div class="info">${g.n}</div>
                    </div>`;
            });
        }

        function show(id, btn) {
            document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
            document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            btn.classList.add('active');
        }

        function launch(u, n, t) {
            document.getElementById('theater').style.display = 'flex';
            document.getElementById('g-title').innerText = n;
            document.getElementById('popout').onclick = () => window.open(u, '_blank');
            const frame = document.getElementById('g-frame');
            if(u) frame.src = u;
            else if(t==='hack') frame.srcdoc = "<body style='background:#000;color:#0ff;display:flex;align-items:center;justify-content:center;height:100vh;font-family:monospace'><h1>ACCESS_GRANTED</h1></body>";
        }

        function closeG() { document.getElementById('theater').style.display='none'; document.getElementById('g-frame').src=""; }
        function toggleRGB() { rgb = !rgb; init(); }
        function filter() {
            const q = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => c.style.display = c.dataset.name.includes(q) ? 'block' : 'none');
        }

        init();
    </script>
</body>
</html>
