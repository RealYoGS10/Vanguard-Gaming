<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANGUARD | ORIGINALS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&display=swap');
        :root { --cyan: #00ffff; --bg: #00050a; }
        
        @keyframes rgb-flow {
            0% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
            33% { border-color: #00ff00; box-shadow: 0 0 10px #00ff00; }
            66% { border-color: #0000ff; box-shadow: 0 0 10px #0000ff; }
            100% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
        }

        body { background: var(--bg); color: var(--cyan); font-family: 'Orbitron', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 70px; background: #001111; border-right: 2px solid var(--cyan); display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        .side-btn { width: 45px; height: 45px; margin-bottom: 25px; border: 1px solid var(--cyan); border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; font-size: 20px; }
        .side-btn:hover, .side-btn.active { background: var(--cyan); color: #000; box-shadow: 0 0 15px var(--cyan); }

        .main { flex: 1; overflow-y: auto; background: radial-gradient(circle, #001a2a 0%, #000 100%); }
        .view { display: none; padding: 40px; }
        .view.active { display: block; }
        header { padding: 30px; text-align: center; border-bottom: 2px solid var(--cyan); background: rgba(0,0,0,0.8); margin-bottom: 20px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        .card { background: #000; border: 3px solid var(--cyan); border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .card.rgb-on { animation: rgb-flow 5s infinite linear; }
        .thumb { width: 100%; height: 130px; background: #001111; display: flex; align-items: center; justify-content: center; font-family: 'Share Tech Mono'; font-size: 12px; text-align: center; color: #444; border-bottom: 1px solid var(--cyan); }
        .info { padding: 12px; text-align: center; font-weight: bold; font-size: 11px; }

        #theater { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; flex-direction: column; }
        .t-bar { padding: 15px; background: #001a1a; border-bottom: 2px solid var(--cyan); display: flex; justify-content: space-between; }
        #game-area { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; font-family: 'Share Tech Mono'; }
        
        .g-btn { padding: 10px 20px; margin: 5px; background: transparent; color: var(--cyan); border: 1px solid var(--cyan); cursor: pointer; font-family: 'Orbitron'; }
        input { background: #000; color: var(--cyan); border: 1px solid var(--cyan); padding: 10px; font-family: 'Share Tech Mono'; width: 300px; text-align: center; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="side-btn active" onclick="tab('home', this)">🏠</div>
        <div class="side-btn" onclick="tab('settings', this)">⚙️</div>
    </div>

    <div class="main">
        <div id="home" class="view active">
            <header><h1 style="letter-spacing: 10px;">VANGUARD GAMING</h1></header>
            <div class="grid" id="game-grid"></div>
        </div>

        <div id="settings" class="view">
            <header><h1>SETTINGS</h1></header>
            <button class="g-btn" style="width:100%" onclick="toggleRGB()">TOGGLE RGB BORDERS</button>
        </div>
    </div>

    <div id="theater">
        <div class="t-bar">
            <button onclick="closeG()" class="g-btn">ABORT</button>
            <h2 id="t-title" style="margin:0;">CORE_INIT</h2>
            <span></span>
        </div>
        <div id="game-area"></div>
    </div>

    <script>
        const games = [
            { n: "HACKERTYPE", type: "hack" },
            { n: "BOTTLE FLIP", type: "flip" },
            { n: "RPS: SHOOT", type: "rps" },
            { n: "BLOXD.IO", u: "https://bloxd.io/" },
            { n: "VECK.IO", u: "https://veck.io/" },
            { n: "SPACE WAVES", u: "https://spacewaves.io/" }
        ];

        let rgb = true;
        function load() {
            const g = document.getElementById('game-grid'); g.innerHTML = "";
            games.forEach(x => {
                g.innerHTML += `<div class="card ${rgb?'rgb-on':''}" onclick="play('${x.u||''}','${x.n}','${x.type||''}')">
                    <div class="thumb">IMAGE NOT FOUND<br>[404]</div><div class="info">${x.n}</div></div>`;
            });
        }

        function tab(id, b) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.side-btn').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active'); b.classList.add('active');
        }

        function toggleRGB() { rgb = !rgb; load(); }

        function play(u, n, t) {
            document.getElementById('theater').style.display = 'flex';
            document.getElementById('t-title').innerText = n;
            const a = document.getElementById('game-area');
            if(u) a.innerHTML = `<iframe src="${u}"></iframe>`;
            else if(t==='hack') startHacker();
            else if(t==='flip') startFlip();
            else if(t==='rps') startRPS();
        }

        function startHacker() {
            const code = "ACCESS_MAIN_FRAME --BYPASS_ENCRYPTION --OVERRIDE_ROOT";
            document.getElementById('game-area').innerHTML = `<h3>TYPE THE KEY:</h3><p style="color:#fff">${code}</p><input id="h-in" oninput="checkH(this,'${code}')">`;
        }
        function checkH(i, c) { if(i.value === c) { alert("SYSTEM OVERRIDDEN"); closeG(); } }

        function startFlip() {
            document.getElementById('game-area').innerHTML = `<h1 id="f-res">🍾</h1><button class="g-btn" onclick="flip()">FLIP BOTTLE</button>`;
        }
        function flip() {
            const r = Math.random() > 0.7 ? "LANDED! ✅" : "FAILED ❌";
            document.getElementById('f-res').innerText = r;
        }

        function startRPS() {
            document.getElementById('game-area').innerHTML = `<h3>SHOOT!</h3><button class="g-btn" onclick="rps('Rock')">ROCK</button><button class="g-btn" onclick="rps('Paper')">PAPER</button><button class="g-btn" onclick="rps('Scissors')">SCISSORS</button><h2 id="r-res"></h2>`;
        }
        function rps(p) {
            const m = ['Rock','Paper','Scissors']; const b = m[Math.floor(Math.random()*3)];
            document.getElementById('r-res').innerText = `YOU: ${p} | BOT: ${b}`;
        }

        function closeG() { document.getElementById('theater').style.display = 'none'; document.getElementById('game-area').innerHTML = ""; }
        load();
    </script>
</body>
</html>
