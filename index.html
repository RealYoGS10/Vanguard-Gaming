<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VANGUARD | V16</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&display=swap');
        :root { --cyan: #00ffff; --bg: #000a0f; --card: rgba(0, 30, 40, 0.7); }
        
        body { background: var(--bg); color: var(--cyan); font-family: 'Orbitron', sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* MUSIC PLAYER - BOTTOM LEFT */
        .music-ctrl { position: fixed; bottom: 80px; left: 20px; z-index: 1000; background: rgba(0,0,0,0.8); border: 1px solid var(--cyan); padding: 10px; border-radius: 30px; display: flex; align-items: center; gap: 10px; box-shadow: 0 0 10px var(--cyan); }
        .music-ctrl button { background: none; border: 1px solid var(--cyan); color: var(--cyan); border-radius: 50%; width: 30px; height: 30px; cursor: pointer; }

        /* NAVBAR - BOTTOM FOR MOBILE, TOP FOR PC */
        .nav { background: rgba(0,10,15,0.95); border-top: 2px solid var(--cyan); height: 60px; display: flex; justify-content: space-around; align-items: center; order: 2; }
        @media (min-width: 768px) { .nav { order: 0; border-top: none; border-bottom: 2px solid var(--cyan); } }

        .main { flex: 1; overflow-y: auto; padding: 20px; order: 1; -webkit-overflow-scrolling: touch; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(5, 1fr); } }

        .card { background: var(--card); border: 1px solid rgba(0,255,255,0.2); border-radius: 12px; text-align: center; padding: 15px; transition: 0.3s; cursor: pointer; }
        .card img { width: 50px; height: 50px; margin-bottom: 10px; filter: drop-shadow(0 0 5px var(--cyan)); }
        .card span { display: block; font-size: 10px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* THEATER MODE (FIX FOR "IP NOT FOUND") */
        #theater { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; flex-direction: column; }
        .t-bar { padding: 10px; background: #001a1a; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--cyan); }
        iframe { flex: 1; border: none; background: #fff; }
        .err-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: -1; color: #555; }

        .btn { background: none; border: 1px solid var(--cyan); color: var(--cyan); padding: 8px 15px; font-family: 'Orbitron'; cursor: pointer; border-radius: 5px; font-size: 12px; }
        .btn:hover { background: var(--cyan); color: #000; }
        #search { width: 90%; max-width: 400px; background: #000; border: 1px solid var(--cyan); color: var(--cyan); padding: 10px; border-radius: 20px; margin-bottom: 20px; display: block; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body>

    <div class="music-ctrl">
        <span style="font-size: 8px;">PHONK_DRIVE</span>
        <button onclick="document.getElementById('m-player').paused ? document.getElementById('m-player').play() : document.getElementById('m-player').pause()">⏯</button>
        <audio id="m-player" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"></audio>
    </div>

    <div class="nav">
        <div onclick="location.reload(true)" style="cursor:pointer">🏠</div>
        <div onclick="alert('Vanguard V16 Loaded')" style="cursor:pointer">⚙️</div>
    </div>

    <div class="main">
        <input type="text" id="search" placeholder="SEARCH_DATABASE..." oninput="search()">
        <div class="grid" id="grid"></div>
    </div>

    <div id="theater">
        <div class="t-bar">
            <button class="btn" onclick="document.getElementById('theater').style.display='none'; document.getElementById('gf').src=''">CLOSE</button>
            <button class="btn" id="force-btn" style="border-color: #ff0055; color: #ff0055;">FORCE OPEN (NEW TAB)</button>
        </div>
        <div class="err-msg">
            <p>If the game doesn't load here (IP Error/Refused),<br>click <b>FORCE OPEN</b> above.</p>
        </div>
        <iframe id="gf"></iframe>
    </div>

    <script>
        const db = [
            {n:"Drift Hunters", u:"https://drift-hunters.com"}, {n:"1v1.lol", u:"https://1v1.lol"}, {n:"Krunker", u:"https://krunker.io"}, {n:"Shell Shockers", u:"https://shellshockers.io"}, {n:"Polytrack", u:"https://polytrack.io"}, {n:"Smash Karts", u:"https://smashkarts.io"}, {n:"Moto X3M", u:"https://motox3m.org"}, {n:"Infinite Craft", u:"https://neal.fun/infinite-craft/"}, {n:"Bloxd.io", u:"https://bloxd.io"}, {n:"Snow Rider 3D", u:"https://snowrider3d.com"}, {n:"Slither.io", u:"https://slither.io"}, {n:"Agar.io", u:"https://agar.io"}, {n:"Paper.io", u:"https://paper-io.com"}, {n:"Diep.io", u:"https://diep.io"}, {n:"Moomoo.io", u:"https://moomoo.io"}, {n:"Zombs Royale", u:"https://zombsroyale.io"}, {n:"Suroi.io", u:"https://suroi.io"}, {n:"Kirka.io", u:"https://kirka.io"}, {n:"Ev.io", u:"https://ev.io"}, {n:"Venge.io", u:"https://venge.io"}, {n:"BitLife", u:"https://bitlifeonline.com"}, {n:"Cookie Clicker", u:"https://orteil.dashnet.org/cookieclicker/"}, {n:"Chess.com", u:"https://chess.com"}, {n:"Tetr.io", u:"https://tetr.io"}
        ];

        function build() {
            const g = document.getElementById('grid');
            g.innerHTML = db.map(i => `
                <div class="card" onclick="launch('${i.u}', '${i.n}')">
                    <img src="https://www.google.com/s2/favicons?sz=64&domain=${new URL(i.u).hostname}">
                    <span>${i.n}</span>
                </div>
            `).join('');
        }

        function launch(u, n) {
            document.getElementById('theater').style.display = 'flex';
            document.getElementById('gf').src = u;
            document.getElementById('force-btn').onclick = () => window.open(u, '_blank');
        }

        function search() {
            let v = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(v) ? 'block' : 'none';
            });
        }

        // Cache-Buster & Auto-Load
        window.onload = build;
    </script>
</body>
</html>
